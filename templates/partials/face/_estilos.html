<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        margin:0;
        background:#000;
        width:100vw;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
    }
    /* CARA (contenedor vertical) */
    .face {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        transition: .35s;
        animation: breathing 5s ease-in-out infinite;
    }

    /* Halo azul detrás de la cara */
    .face::before{
        content: "";
        position: absolute;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%);
        z-index: -1;
        pointer-events: none;

        width: 1000px;
        height: 1000px;
        border-radius: 50%;

        background: radial-gradient(
            circle,
            rgba(120,230,255,.30) 0%,
            rgba(80,190,255,.22) 20%,
            rgba(50,150,255,.14) 40%,
            rgba(40,120,255,.08) 60%,
            rgba(80,180,255,.04) 75%,
            rgba(120,220,255,.02) 88%,
            transparent 100%
        );

        filter: blur(65px);

        animation: faceGlow 5.5s ease-in-out infinite;
    }

    @keyframes faceGlow{
        0%,100%{
            transform: translate(-50%, -50%) scale(0.97);
            opacity: .85;
            filter: blur(60px);
        }

        50%{
            transform: translate(-50%, -50%) scale(1.05);
            opacity: 1;
            filter: blur(75px);
        }
    }

    /* CEJAS */
    .eyebrows {
        display: flex;
        justify-content: center;
        gap: 170px;             /* un poco más juntas */
        margin-bottom: 15px;   /* más arriba */
        z-index: 2;
    }
    .eyebrow {
        width: 90px;            /* un poco más pequeñas */
        height: auto;
        transition: .35s;
        transform-origin: center center;
    }

    /* OJOS */
    .eyes {
        display: flex;
        justify-content: center;
        gap: 70px;              /* ojos más juntos para acompañar la rotación hacia dentro */
    }
    .eye {
        width: 150px;
        height: auto;
        transition: .35s;
        transform-origin: center center;
    }
    /* Rotación base: mirando hacia la nariz */
    .eye-left  { transform: rotate(5deg); }
    .eye-right { transform: rotate(-5deg); }

    /* BOCA */
    .mouth-container {
        margin-top: 20px;
        overflow: visible;
    }
    .mouth {
        overflow: visible;
        width: 90px;
        height: auto;
        transition: .35s;
        transform-origin: center center;
    }

    @keyframes breathing{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-2px);}
    }

    /* IDLE */
    .idle .eye-left{animation:idleLeft 7s infinite ease-in-out;}
    .idle .eye-right{animation:idleRight 7s infinite ease-in-out;}
    @keyframes idleLeft{
        0%,100%{
            transform:rotate(5deg) translate(0,0);
        }
        20%{
            transform:rotate(5deg) translate(-1px,-1px);
        }
        40%{
            transform:rotate(5deg) translate(1px,0px);
        }
        60%{
            transform:rotate(5deg) translate(0px,1px);
        }
        80%{
            transform:rotate(5deg) translate(-1px,0px);
        }
    }

    @keyframes idleRight{
        0%,100%{
            transform:rotate(-5deg) translate(0,0);
        }
        20%{
            transform:rotate(-5deg) translate(-1px,-1px);
        }
        40%{
            transform:rotate(-5deg) translate(1px,0px);
        }
        60%{
            transform:rotate(-5deg) translate(0px,1px);
        }
        80%{
            transform:rotate(-5deg) translate(-1px,0px);
        }
    }

    .eye.blink{
        animation: blink .14s ease;
    }

    @keyframes blink{
        0%{
            transform:scaleY(1);
        }
        45%{
            transform:scaleY(0.03);
        }
        100%{
            transform:scaleY(1);
        }
    }

    /* Keyframes de movimiento */
    @keyframes lookRight {
        0%,12%   { transform: translateX(0); }
        22%,55%  { transform: translateX(14px); }
        65%,100% { transform: translateX(0); }
    }
    @keyframes lookLeft {
        0%,12%   { transform: translateX(0); }
        22%,55%  { transform: translateX(-14px); }
        65%,100% { transform: translateX(0); }
    }
    @keyframes lookUp {
        0%,12%   { transform: translateY(0); }
        22%,55%  { transform: translateY(-10px); }
        65%,100% { transform: translateY(0); }
    }
    @keyframes browFrownLeft {
        0%,12%   { transform: rotate(0deg); }
        22%,55%  { transform: rotate(-9deg); }
        65%,100% { transform: rotate(0deg); }
    }
    @keyframes browFrownRight {
        0%,12%   { transform: rotate(0deg); }
        22%,55%  { transform: rotate(9deg); }
        65%,100% { transform: rotate(0deg); }
    }
    @keyframes browShiftRight {
        0%,12%   { transform: translateX(0); }
        22%,55%  { transform: translateX(10px); }
        65%,100% { transform: translateX(0); }
    }
    @keyframes browShiftLeft {
        0%,12%   { transform: translateX(0); }
        22%,55%  { transform: translateX(-10px); }
        65%,100% { transform: translateX(0); }
    }
    @keyframes mouthSearch {
        0%,12%   { transform: translateX(0) translateY(0); }
        22%,55%  { transform: translateX(var(--mouth-x, 0px)) translateY(var(--mouth-y, 0px)); }
        65%,100% { transform: translateX(0) translateY(0); }
    }
    /* Búsqueda de ojos */
    @keyframes eyeLookRight {
        0%,12%   { transform: rotate(5deg) translateX(0); }
        22%,55%  { transform: rotate(5deg) translateX(14px); }
        65%,100% { transform: rotate(5deg) translateX(0); }
    }
    @keyframes eyeLookRightMirror {
        0%,12%   { transform: rotate(-5deg) translateX(0); }
        22%,55%  { transform: rotate(-5deg) translateX(14px); }
        65%,100% { transform: rotate(-5deg) translateX(0); }
    }
    @keyframes eyeLookLeft {
        0%,12%   { transform: rotate(5deg) translateX(0); }
        22%,55%  { transform: rotate(5deg) translateX(-14px); }
        65%,100% { transform: rotate(5deg) translateX(0); }
    }
    @keyframes eyeLookLeftMirror {
        0%,12%   { transform: rotate(-5deg) translateX(0); }
        22%,55%  { transform: rotate(-5deg) translateX(-14px); }
        65%,100% { transform: rotate(-5deg) translateX(0); }
    }
    @keyframes eyeLookUp {
        0%,12%   { transform: rotate(5deg) translateY(0); }
        22%,55%  { transform: rotate(5deg) translateY(-10px); }
        65%,100% { transform: rotate(5deg) translateY(0); }
    }
    @keyframes eyeLookUpMirror {
        0%,12%   { transform: rotate(-5deg) translateY(0); }
        22%,55%  { transform: rotate(-5deg) translateY(-10px); }
        65%,100% { transform: rotate(-5deg) translateY(0); }
    }

    /* Parpadeo */
    @keyframes idleBlink {
        0%,88%,100% { transform: scaleY(1); }
        91%          { transform: scaleY(0.04); }
    }

    /* LISTENING */
    .listening .eye{
        animation:listeningPulse .9s infinite ease-in-out;
        filter:drop-shadow(0 0 10px #00aaff) drop-shadow(0 0 20px #00aaff);
    }
    @keyframes listeningPulse{
        0%,100%{transform:rotate(5deg) scale(1);}
        50%{transform:rotate(5deg) scale(1.12);}
    }

    /* THINKING */
    .thinking .eye{animation:thinkingAnim .85s infinite ease-in-out;}
    @keyframes thinkingAnim{
        0%,100%{transform:scaleY(1) scaleX(1);}
        50%{transform:translateY(-6px) scaleY(.72) scaleX(1.08);}
    }

    /* SPEAKING */
    .eye.blink{
        animation: blink .14s ease;
    }

    @keyframes blink{
        0%{
            transform:scaleY(1);
        }
        45%{
            transform:scaleY(0.03);
        }
        100%{
            transform:scaleY(1);
        }
    }
    /*.speaking .mouth-single {
    animation: mouthSpeak 0.12s ease-in-out infinite alternate;
    animation-delay: 0.05s; /* Pequeño retraso para coincidir con el ataque del audio 
    }*/
 
    /*.face:not(.speaking) .mouth-single {
        animation-play-state: paused;
    }*/

    .mouth-single {
        /* sin animación por defecto */
    }
    .mouth-active {
        animation: mouthSpeak 0.12s ease-in-out infinite alternate;
        animation-delay: 0.05s; /* Pequeño retraso para coincidir con el ataque del audio */
    }

    @keyframes mouthSpeak {
        0% {
            d: path("M 265.112 239.115 C 265.112 243.048 255.383 247.237 243.382 247.237 C 231.381 247.237 221.652 243.048 221.652 239.115 C 221.652 236.182 230.758 240.737 242.759 240.737 C 254.76 240.737 265.112 236.182 265.112 239.115 Z");
        }
        100% {
            d: path("M 265.112 239.115 C 265.112 248.5 255.383 255.0 243.382 255.0 C 231.381 255.0 221.652 248.5 221.652 239.115 C 221.652 229.73 231.381 233.23 243.382 233.23 C 255.383 233.23 265.112 229.73 265.112 239.115 Z");
        }
    }

    /* HAPPY */
    .happy .eye{
        animation:happyAnim .45s infinite ease-in-out;
        fill:#ffb347;
    }
    @keyframes happyAnim{
        0%,100%{transform: scaleY(.28) translateY(-6%);}
        50%{transform: scaleY(.18) translateY(-12%);}
    }

    /* ERROR */
    .error .eye{
        fill:#ff3a3a;
        animation:errorAnim .18s infinite;
    }
    @keyframes errorAnim{
        0%{transform:translateX(-1%);}
        50%{transform:translateX(1%);}
        100%{transform:translateX(-1%);}
    }

    /* SENSEI */
    .sensei .eye{
        transform: scaleY(0.45) scaleX(1.12);
        transition: transform 0.5s ease;
    }
    .sensei .eye-left,
    .sensei .eye-right{
        transform: scaleY(0.45) scaleX(1.12) !important;
    }
</style>
