<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kaito — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px;
            width: 320px;
            text-align: center;
        }
        h1 {
            color: #0096ff;
            margin-bottom: 8px;
            font-size: 22px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 13px;
        }
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            background: #0096ff;
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.85; }
        .error {
            background: #330d0d;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 Kaito</h1>
        <p>Panel de administración</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="password"
                   name="password"
                   placeholder="Contraseña"
                   autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
