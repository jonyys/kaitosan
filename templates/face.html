<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Robot Face</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* Fondo negro */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --iris-light: #964e1e;
            --iris-dark: #32170D;
            --lid-color: #1a0d08;
            --sclera-color: #fdfdfb;
        }

        body {
            background: #000;
            width: 480px;
            height: 480px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor de los ojos */
        .face {
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        /* ── OJO (SVG) ── */
        .eye {
            width: 168px;
            height: 128px;
            overflow: visible;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .eye-right { transform: scaleX(-1); }

        .eyeball {
            transform-origin: 100px 76px;
            transition: transform 0.2s ease;
        }

        .pupil-cluster {
            transform-origin: 100px 76px;
            transition: transform 0.25s ease;
        }

        .iris {
            fill: url(#irisGrad);
        }

        .iris-rim {
            fill: none;
            stroke: var(--lid-color);
            stroke-width: 3;
        }

        .pupil {
            fill: #0a0604;
        }

        .highlight-main,
        .highlight-2,
        .highlight-3 {
            fill: #ffffff;
        }

        .lid-shadow {
            fill: url(#lidShadowGrad);
            opacity: 0.3;
        }

        .lid-upper {
            fill: none;
            stroke: var(--lid-color);
            stroke-width: 8;
            stroke-linecap: round;
        }

        .lid-lower {
            fill: none;
            stroke: var(--lid-color);
            stroke-width: 2;
            stroke-linecap: round;
            opacity: 0.55;
        }

        .lash {
            stroke: var(--lid-color);
            stroke-width: 3;
            stroke-linecap: round;
        }

        .happy-arc {
            fill: none;
            stroke: url(#irisGrad);
            stroke-width: 11;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        /* ── ESTADOS ── */

        /* IDLE — parpadeo automático */
        .idle .eyeball {
            animation: parpadeo 4.5s infinite;
        }

        @keyframes parpadeo {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.06); }
        }

        /* ESCUCHANDO — ojos más grandes y brillantes */
        .listening .eye {
            transform: scale(1.12);
            animation: pulso 1s infinite;
        }
        .listening .eye-right { transform: scaleX(-1.12); }

        @keyframes pulso {
            0%, 100% { filter: drop-shadow(0 0 10px #2596BE); }
            50%       { filter: drop-shadow(0 0 26px #2596BE) drop-shadow(0 0 40px #2596BE); }
        }

        /* PENSANDO — mirada hacia arriba */
        .thinking .pupil-cluster {
            transform: translateY(-16px);
        }

        .thinking .eyeball {
            animation: pensar 1.6s infinite;
        }

        @keyframes pensar {
            0%, 100% { transform: scaleY(1); }
            50%       { transform: scaleY(0.75); }
        }

        /* HABLANDO — pupila pulsando ligeramente */
        .speaking .pupil-cluster {
            animation: hablar_pupila 0.35s infinite;
        }

        @keyframes hablar_pupila {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }

        /* FELIZ — arcos curvados hacia arriba, iris oculto */
        .happy .eyeball {
            opacity: 0;
        }
        .happy .lid-upper,
        .happy .lid-lower {
            opacity: 0;
        }
        .happy .happy-arc {
            opacity: 1;
        }
        .happy .eye {
            animation: feliz 0.5s ease;
            filter: drop-shadow(0 0 18px #ffcc55);
        }

        @keyframes feliz {
            0%   { transform: scale(0.85); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .happy .eye-right { transform: scaleX(-1); }

        /* ERROR — iris en tono rojo, ligero temblor */
        .error {
            --iris-light: #ff6b5b;
            --iris-dark: #4a0a06;
        }
        .error .eye {
            animation: error_anim 0.4s infinite;
        }
        .error .lid-upper,
        .error .lid-lower {
            stroke: #7a1a12;
        }

        @keyframes error_anim {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-3px); }
            75%       { transform: translateX(3px); }
        }
        .error .eye-right { animation: error_anim_r 0.4s infinite; }
        @keyframes error_anim_r {
            0%, 100% { transform: scaleX(-1) translateX(0); }
            25%       { transform: scaleX(-1) translateX(-3px); }
            75%       { transform: scaleX(-1) translateX(3px); }
        }

    </style>
</head>
<!-- Chat para probar sin micrófono -->
<div id="chat" style="
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    display: flex;
    gap: 8px;
">
    <input 
        type="text" 
        id="input" 
        placeholder="Escribe algo a Kaitosan..."
        style="
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        "
    />
    <button 
        onclick="enviarMensaje()"
        style="
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #0096ff;
            color: white;
            cursor: pointer;
            font-size: 14px;
        "
    >
        Enviar
    </button>

    <!-- Botón de voz -->
    <button
        id="btn-voz"
        onclick="grabarVoz()"
        style="
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: #00cc44;
            color: white;
            cursor: pointer;
            font-size: 18px;
        "
    >
        🎤
    </button>
</div>



<!-- Respuesta del robot -->
<div id="respuesta" style="
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    text-align: center;
    color: white;
    font-size: 14px;
    font-family: sans-serif;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    display: none;
">
</div>

<script>
    // Enviar mensaje con Enter
    document.getElementById('input')
        .addEventListener('keypress', function(e) {
        if (e.key === 'Enter') enviarMensaje();
    });

    async function enviarMensaje() {
        const input = document.getElementById('input');
        const respuestaDiv = document.getElementById('respuesta');
        const mensaje = input.value.trim();

        if (!mensaje) return;

        // Limpiar input
        input.value = '';

        // Mostrar que está procesando
        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = '...';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ mensaje: mensaje })
            });

            const data = await response.json();

            if (data.respuesta) {
                respuestaDiv.textContent = data.respuesta;
            } else {
                respuestaDiv.textContent = 'Error: ' + data.error;
            }

        } catch (error) {
            respuestaDiv.textContent = 'Error de conexión';
        }
    }

    // Estado del botón de voz
    let grabando = false;

    async function grabarVoz() {
        if (grabando) return;

        const btn = document.getElementById('btn-voz');
        const respuestaDiv = document.getElementById('respuesta');

        grabando = true;

        // Cambia aspecto del botón
        btn.style.background = '#ff3333';
        btn.textContent = '⏺️';

        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = '🎤 Grabando 5 segundos...';

        try {
            const response = await fetch('/grabar', {
                method: 'POST'
            });

            const data = await response.json();

            if (data.transcripcion) {
                respuestaDiv.textContent =
                    `📝 "${data.transcripcion}"`;
            }

            if (data.error) {
                respuestaDiv.textContent = '❌ ' + data.error;
            }

        } catch (error) {
            respuestaDiv.textContent = '❌ Error de conexión';
        } finally {
            // Restaura el botón
            grabando = false;
            btn.style.background = '#00cc44';
            btn.textContent = '🎤';
        }
    }

    // Muestra la transcripción cuando llega por WebSocket
    socket.on('transcripcion', function(data) {
        const respuestaDiv = document.getElementById('respuesta');
        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = `📝 "${data.texto}"`;
    });
</script>
<body>
    <div class="face idle" id="face">

        <!-- OJO IZQUIERDO -->
        <svg class="eye eye-left" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="irisGrad" cx="38%" cy="32%" r="72%">
                    <stop offset="0%" stop-color="var(--iris-light)"/>
                    <stop offset="100%" stop-color="var(--iris-dark)"/>
                </radialGradient>
                <linearGradient id="lidShadowGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
                </linearGradient>
                <clipPath id="lidClip">
                    <path d="M15,82 C30,25 75,12 100,12 C125,12 170,20 185,66 C170,110 125,132 100,132 C75,132 30,118 15,82 Z"/>
                </clipPath>
            </defs>

            <g transform="rotate(180 100 75)">
                <g class="eyeball" clip-path="url(#lidClip)">
                    <rect x="0" y="0" width="200" height="150" fill="var(--sclera-color)"/>
                    <g class="pupil-cluster">
                        <circle class="iris" cx="100" cy="76" r="33"/>
                        <circle class="iris-rim" cx="100" cy="76" r="33"/>
                        <circle class="pupil" cx="100" cy="76" r="16"/>
                        <circle class="highlight-main" cx="88" cy="60" r="10"/>
                        <circle class="highlight-2" cx="113" cy="88" r="4"/>
                        <circle class="highlight-3" cx="101" cy="96" r="2.5"/>
                    </g>
                    <rect class="lid-shadow" x="0" y="0" width="200" height="46"/>
                </g>

                <path class="happy-arc" d="M18,88 Q100,38 182,88"/>

                <path class="lid-upper" d="M15,82 C30,25 75,12 100,12 C125,12 170,20 185,66"/>
                <path class="lid-lower" d="M17,84 C32,110 72,124 100,126 C124,124 165,108 183,68"/>

                <path class="lash" d="M183,64 L196,52"/>
                <path class="lash" d="M180,72 L191,64"/>
            </g>
        </svg>

        <!-- OJO DERECHO (misma plantilla, se voltea con CSS) -->
        <svg class="eye eye-right" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="irisGrad2" cx="38%" cy="32%" r="72%">
                    <stop offset="0%" stop-color="var(--iris-light)"/>
                    <stop offset="100%" stop-color="var(--iris-dark)"/>
                </radialGradient>
                <linearGradient id="lidShadowGrad2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
                </linearGradient>
                <clipPath id="lidClip2">
                    <path d="M15,82 C30,25 75,12 100,12 C125,12 170,20 185,66 C170,110 125,132 100,132 C75,132 30,118 15,82 Z"/>
                </clipPath>
            </defs>

            <g transform="rotate(180 100 75)">
                <g class="eyeball" clip-path="url(#lidClip2)">
                    <rect x="0" y="0" width="200" height="150" fill="var(--sclera-color)"/>
                    <g class="pupil-cluster">
                        <circle class="iris" cx="100" cy="76" r="33" fill="url(#irisGrad2)"/>
                        <circle class="iris-rim" cx="100" cy="76" r="33"/>
                        <circle class="pupil" cx="100" cy="76" r="16"/>
                        <circle class="highlight-main" cx="88" cy="60" r="10"/>
                        <circle class="highlight-2" cx="113" cy="88" r="4"/>
                        <circle class="highlight-3" cx="101" cy="96" r="2.5"/>
                    </g>
                    <rect class="lid-shadow" x="0" y="0" width="200" height="46" fill="url(#lidShadowGrad2)"/>
                </g>

                <path class="happy-arc" d="M18,88 Q100,38 182,88" stroke="url(#irisGrad2)"/>

                <path class="lid-upper" d="M15,82 C30,25 75,12 100,12 C125,12 170,20 185,66"/>
                <path class="lid-lower" d="M17,84 C32,110 72,124 100,126 C124,124 165,108 183,68"/>

                <path class="lash" d="M183,64 L196,52"/>
                <path class="lash" d="M180,72 L191,64"/>
            </g>
        </svg>

    </div>

    <script>
        const socket = io();
        const face = document.getElementById('face');

        // Estados disponibles
        const estados = [
            'idle',
            'listening',
            'thinking',
            'speaking',
            'happy',
            'error'
        ];

        // Recibe el estado desde Python
        socket.on('estado', function(data) {
            console.log('Estado recibido:', data.estado);

            // Quita todas las clases de estado
            estados.forEach(e => face.classList.remove(e));

            // Añade la nueva clase de estado
            face.classList.add(data.estado);
        });
    </script>
</body>
</html>
