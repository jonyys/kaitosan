<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Robot Face</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#000;
            width:480px;
            height:480px;
            overflow:hidden;

            display:flex;
            justify-content:center;
            align-items:center;

        }

        /* ===================================================== */
        /* CARA */
        /* ===================================================== */

        .face{

            display:flex;
            justify-content:center;
            align-items:center;
            gap:90px;

            transition:.35s;

            animation:breathing 5s ease-in-out infinite;

        }

        @keyframes breathing{

            0%,100%{

                transform:translateY(0);

            }

            50%{

                transform:translateY(-2px);

            }

        }

        /* ===================================================== */
        /* OJOS */
        /* ===================================================== */

        .eye{

            width:90px;
            height:150px;

            fill:rgb(175, 71, 32);

            transition:.35s;

            transform-origin:center center;

        }

        .eye-left{

            transform:rotate(-6deg);

        }

        .eye-right{

            transform:rotate(6deg);

        }

        /* ===================================================== */
        /* IDLE */
        /* ===================================================== */

        .idle .eye-left{

            animation:idleLeft 5s infinite ease-in-out;

        }

        .idle .eye-right{

            animation:idleRight 5s infinite ease-in-out;

        }

        @keyframes idleLeft{

        0%,100%{

            transform:
            rotate(-6deg)
            translateX(0);

        }

        18%{

            transform:
            rotate(-6deg)
            translateX(-4px);

        }

        37%{

            transform:
            rotate(-6deg)
            translateX(3px);

        }

        63%{

            transform:
            rotate(-6deg)
            translateX(-2px);

        }

        82%{

            transform:
            rotate(-6deg)
            translateX(2px);

        }

        }

        @keyframes idleRight{

        0%,100%{

            transform:
            rotate(6deg)
            translateX(0);

        }

        18%{

            transform:
            rotate(6deg)
            translateX(-4px);

        }

        37%{

            transform:
            rotate(6deg)
            translateX(3px);

        }

        63%{

            transform:
            rotate(6deg)
            translateX(-2px);

        }

        82%{

            transform:
            rotate(6deg)
            translateX(2px);

        }

        }

        /* ===================================================== */
        /* LISTENING */
        /* ===================================================== */

        .listening .eye{

            animation:listeningPulse .9s infinite ease-in-out;

            filter:
            drop-shadow(0 0 10px #00aaff)
            drop-shadow(0 0 20px #00aaff);

        }

        @keyframes listeningPulse{

        0%,100%{

            transform:scale(1);

        }

        50%{

            transform:scale(1.12);

        }

        }

        /* ===================================================== */
        /* THINKING */
        /* ===================================================== */

        .thinking .eye{

            animation:thinkingAnim .85s infinite ease-in-out;

        }

        @keyframes thinkingAnim{

        0%,100%{

            transform:

            scaleY(1)

            scaleX(1);

        }

        50%{

            transform:

            translateY(-6px)

            scaleY(.72)

            scaleX(1.08);

        }

        }

        /* ===================================================== */
        /* SPEAKING */
        /* ===================================================== */

        .speaking .eye{

            animation:speakingAnim .35s infinite ease-in-out;

        }

        @keyframes speakingAnim{

        0%,100%{

            transform:

            translateY(0)

            scaleY(.82)

            scaleX(1);

        }

        50%{

            transform:

            translateY(-3px)

            scaleY(.72)

            scaleX(1.08);

        }

        }

        /* ===================================================== */
        /* HAPPY */
        /* ===================================================== */

        .happy .eye{

            animation:happyAnim .45s infinite ease-in-out;

            fill:#ffb347;

        }

        @keyframes happyAnim{

        0%,100%{

            transform:

            scaleY(.28)

            translateY(-6px);

        }

        50%{

            transform:

            scaleY(.18)

            translateY(-9px);

        }

        }

        /* ===================================================== */
        /* ERROR */
        /* ===================================================== */

        .error .eye{

            fill:#ff3a3a;

            animation:errorAnim .18s infinite;

        }

        @keyframes errorAnim{

        0%{

            transform:translateX(-2px);

        }

        50%{

            transform:translateX(2px);

        }

        100%{

            transform:translateX(-2px);

        }

        }

    </style>
</head>
<!-- Chat para probar sin micrófono -->
<div id="chat" style="
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    display: flex;
    gap: 8px;
">
    <input 
        type="text" 
        id="input" 
        placeholder="Escribe algo a Kaitosan..."
        style="
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        "
    />
    <button 
        onclick="enviarMensaje()"
        style="
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #0096ff;
            color: white;
            cursor: pointer;
            font-size: 14px;
        "
    >
        Enviar
    </button>

    <!-- Botón de voz -->
    <button
        id="btn-voz"
        onclick="grabarVoz()"
        style="
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: #00cc44;
            color: white;
            cursor: pointer;
            font-size: 18px;
        "
    >
        🎤
    </button>
</div>



<!-- Respuesta del robot -->
<div id="respuesta" style="
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    text-align: center;
    color: white;
    font-size: 14px;
    font-family: sans-serif;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    display: none;
">
</div>

<script>
    // Enviar mensaje con Enter
    document.getElementById('input')
        .addEventListener('keypress', function(e) {
        if (e.key === 'Enter') enviarMensaje();
    });

    async function enviarMensaje() {
        const input = document.getElementById('input');
        const respuestaDiv = document.getElementById('respuesta');
        const mensaje = input.value.trim();

        if (!mensaje) return;

        // Limpiar input
        input.value = '';

        // Mostrar que está procesando
        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = '...';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ mensaje: mensaje })
            });

            const data = await response.json();

            if (data.respuesta) {
                respuestaDiv.textContent = data.respuesta;
            } else {
                respuestaDiv.textContent = 'Error: ' + data.error;
            }

        } catch (error) {
            respuestaDiv.textContent = 'Error de conexión';
        }
    }

    // Estado del botón de voz
    let grabando = false;

    async function grabarVoz() {
        if (grabando) return;

        const btn = document.getElementById('btn-voz');
        const respuestaDiv = document.getElementById('respuesta');

        grabando = true;

        // Cambia aspecto del botón
        btn.style.background = '#ff3333';
        btn.textContent = '⏺️';

        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = '🎤 Grabando 5 segundos...';

        try {
            const response = await fetch('/grabar', {
                method: 'POST'
            });

            const data = await response.json();

            if (data.transcripcion) {
                respuestaDiv.textContent =
                    `📝 "${data.transcripcion}"`;
            }

            if (data.error) {
                respuestaDiv.textContent = '❌ ' + data.error;
            }

        } catch (error) {
            respuestaDiv.textContent = '❌ Error de conexión';
        } finally {
            // Restaura el botón
            grabando = false;
            btn.style.background = '#00cc44';
            btn.textContent = '🎤';
        }
    }

    // Muestra la transcripción cuando llega por WebSocket
    socket.on('transcripcion', function(data) {
        const respuestaDiv = document.getElementById('respuesta');
        respuestaDiv.style.display = 'block';
        respuestaDiv.textContent = `📝 "${data.texto}"`;
    });
</script>
<body>
    <div class="face idle" id="face">

<body>

    <div class="face idle" id="face">

        <!-- Ojo izquierdo -->
        <svg class="eye eye-left"
             viewBox="0 0 100 160"
             xmlns="http://www.w3.org/2000/svg">

            <rect
                x="5"
                y="5"
                width="90"
                height="150"
                rx="30"
                ry="30"
            />

        </svg>

        <!-- Ojo derecho -->
        <svg class="eye eye-right"
             viewBox="0 0 100 160"
             xmlns="http://www.w3.org/2000/svg">

            <rect
                x="5"
                y="5"
                width="90"
                height="150"
                rx="30"
                ry="30"
            />

        </svg>

    </div>

    </div>

    <script>
        const socket = io();
        const face = document.getElementById('face');

        let blinkInterval;

        function iniciarParpadeo() {

            detenerParpadeo();

            function parpadear() {

                if (!face.classList.contains("idle")) {

                    programar();
                    return;

                }

                document.querySelectorAll(".eye").forEach(ojo => {

                    ojo.style.transition = "120ms";
                    ojo.style.transform += " scaleY(0.05)";

                });

                setTimeout(()=>{

                    document.querySelectorAll(".eye").forEach(ojo=>{

                        ojo.style.transform =
                            ojo.classList.contains("eye-left")
                            ? "rotate(-6deg)"
                            : "rotate(6deg)";

                    });

                },120);

                programar();

            }

            function programar(){

                blinkInterval = setTimeout(
                    parpadear,
                    3000 + Math.random()*4000
                );

            }

            programar();

        }

        function detenerParpadeo(){

            clearTimeout(blinkInterval);

        }

        // Estados disponibles
        const estados = [
            'idle',
            'listening',
            'thinking',
            'speaking',
            'happy',
            'error'
        ];

        socket.on("estado",(data)=>{

        estados.forEach(e=>face.classList.remove(e));

        face.classList.add(data.estado);

        if(data.estado==="idle"){

            iniciarParpadeo();

        }else{

            detenerParpadeo();

        }

    });
    iniciarParpadeo();
    </script>
</body>
</html>
